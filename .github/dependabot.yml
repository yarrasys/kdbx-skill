version: 2
updates:
  # Keep GitHub Actions pinned versions fresh. (Each skill pins its own Python deps in its
  # own lockfile, regenerated with `uv lock --script <skill script>`.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
