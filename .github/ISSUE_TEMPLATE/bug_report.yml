name: Bug report
description: Report a problem with a skill in this repo
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! **Never paste a real secret, vault, or key file.** Redact values.
        For security vulnerabilities, do not file here — see [SECURITY.md](https://github.com/yarrasys/extensions/blob/main/SECURITY.md).
  - type: dropdown
    id: skill
    attributes:
      label: Skill
      description: Which skill does this concern?
      options:
        - kdbx
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, the command run (with secrets redacted), and the result.
    validations:
      required: true
  - type: input
    id: skill-version
    attributes:
      label: Skill version
      description: The affected skill's version (e.g. `kdbx --version`)
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: uv-version
    attributes:
      label: uv version
      description: Output of `uv --version`
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Re-run in the skill's debug mode for a full traceback (e.g. `KDBX_DEBUG=1` for kdbx). Redact any secret values.
      render: shell
    validations:
      required: false
